name: Android Release Build & Upload

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  
      contents: read 
    
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true
      
      - name: Install Flutter dependencies
        run: flutter pub get
      
      - name: Download keystore file
        env:
          KEYSTORE_REPO_TOKEN: ${{ secrets.KEYSTORE_REPO_TOKEN }}
          KEYSTORE_BRANCH: ${{ secrets.KEYSTORE_BRANCH || 'main' }}
          ANDROID_STORE_FILE: ${{ secrets.ANDROID_STORE_FILE }}
        run: |
          mkdir -p ../open-tspk-app-ks
          
          # Determine keystore filename (from env var or default)
          KEYSTORE_FILE=${ANDROID_STORE_FILE:-thygeson-app.keystore}
          
          if [ -n "$KEYSTORE_REPO_TOKEN" ]; then
            # Download keystore file
            echo "Downloading keystore file: $KEYSTORE_FILE"
            curl -f -H "Authorization: token $KEYSTORE_REPO_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              -o "../open-tspk-app-ks/$KEYSTORE_FILE" \
              "https://raw.githubusercontent.com/dlebee/open-tspk-app-ks/$KEYSTORE_BRANCH/$KEYSTORE_FILE" || {
              echo "Error: Failed to download keystore file: $KEYSTORE_FILE"
              exit 1
            }
            echo "✓ Keystore file downloaded successfully"
          else
            echo "Warning: KEYSTORE_REPO_TOKEN not configured"
            exit 1
          fi
      
      - name: Create key.properties from secrets
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_FILE: ${{ secrets.ANDROID_STORE_FILE }}
        run: |
          echo "Creating key.properties from secrets..."
          cat > ../open-tspk-app-ks/key.properties << EOF
          storePassword=${ANDROID_STORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD:-${ANDROID_STORE_PASSWORD}}
          keyAlias=${ANDROID_KEY_ALIAS:-upload}
          storeFile=${ANDROID_STORE_FILE:-thygeson-app.keystore}
          EOF
          echo "✓ key.properties created"
      
      - name: Verify keystore setup
        run: |
          if [ -f "../open-tspk-app-ks/key.properties" ]; then
            echo "key.properties found:"
            cat ../open-tspk-app-ks/key.properties | sed 's/Password=.*/Password=***/g'
            STORE_FILE=$(grep storeFile ../open-tspk-app-ks/key.properties | cut -d'=' -f2)
            if [ -f "../open-tspk-app-ks/$STORE_FILE" ]; then
              echo "✓ Keystore file found: $STORE_FILE"
            else
              echo "⚠ Warning: Keystore file not found: $STORE_FILE"
              echo "Build will use environment variables if configured"
            fi
          else
            echo "⚠ Warning: key.properties not found, build will use environment variables"
          fi
      
      - name: Build release AAB
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_FILE: ${{ secrets.ANDROID_STORE_FILE }}
        run: |
          flutter build appbundle --release
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ steps.auth.outputs.credentials_json }}
          packageName: com.davidlebee.thygeson
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: completed
          # Optional: Add release notes
          # inAppUpdatePriority: 2
          # changesNotSentForReview: false
